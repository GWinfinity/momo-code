name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.14
      
      - name: Configure Git
        run: |
          git config user.name "momo Bot"
          git config user.email "bot@momocode.ai"
      
      - name: Install dependencies
        run: bun install
      
      - name: Check rebrand
        run: bash scripts/check-rebrand.sh
      
      - name: Type check
        run: bun typecheck
      
      - name: Build
        run: bun run build
      
      - name: Version and publish
        env:
          MOMO_NPM_TOKEN: ${{ secrets.MOMO_NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${MOMO_NPM_TOKEN}" > ~/.npmrc
          bun run script/release.ts ${{ github.event.inputs.version }}
