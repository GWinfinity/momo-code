name: Type Check

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.14
      
      - name: Install dependencies
        run: bun install
      
      - name: Check rebrand
        run: bash scripts/check-rebrand.sh
      
      - name: Type check
        run: bun typecheck
      
      - name: Lint
        run: bun lint
